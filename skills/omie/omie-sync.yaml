# omie-sync.yaml
# Defines all Omie → Postgres sync jobs.
# Each entry maps one Omie API endpoint to one existing Postgres table.
# The sync script reads this file and runs every job in order.
# If any job fails, the entire run stops immediately.
#
# Fields per entry:
#   table  - target Postgres table name (must already exist)
#   pk     - primary key column name in that table
#   call   - Omie API call name
#   url    - Omie API endpoint URL

syncs:
  - table: omie_produtos
    pk: codigo_produto
    call: ListarProdutos
    url: https://app.omie.com.br/api/v1/geral/produtos/

